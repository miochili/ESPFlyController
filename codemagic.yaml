workflows:
  ios-build:
    name: ESPFlyController iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: 26.2

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Clean old build files
        script: |
          rm -rf build ESPFlyController.xcarchive Payload ESPFlyController.ipa exportOptions.plist

      - name: Archive app
        script: |
          set -e
          xcodebuild archive \
            -project ESPFlyController.xcodeproj \
            -scheme ESPFlyController \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ESPFlyController.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Create export options
        script: |
          cat > exportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ESPFlyController.xcarchive" \
            -exportPath "$CM_BUILD_DIR/exported" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

      - name: Copy IPA artifact
        script: |
          cp "$CM_BUILD_DIR/exported/ESPFlyController.ipa" "$CM_BUILD_DIR/ESPFlyController.ipa"

    artifacts:
      - ESPFlyController.ipa

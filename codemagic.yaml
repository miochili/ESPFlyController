workflows:
  ios-workflow:
    name: ESPFlyController iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project ESPFlyController.xcodeproj \
            -scheme ESPFlyController \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            build
          mkdir -p Payload
          cp -r build/ESPFlyController.app Payload/
          zip -r ESPFlyController.ipa Payload/
    artifacts:
      - ESPFlyController.ipa

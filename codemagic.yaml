workflows:
  ios-build:
    name: ESPFlyController iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: 26.2

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Clean old build files
        script: |
          rm -rf build ESPFlyController.xcarchive Payload ESPFlyController.ipa

      - name: Archive unsigned app
        script: |
          set -e
          xcodebuild archive \
            -project ESPFlyController.xcodeproj \
            -scheme ESPFlyController \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ESPFlyController.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create unsigned IPA
        script: |
          set -e
          rm -rf Payload ESPFlyController.ipa
          mkdir -p Payload
          cp -R "$CM_BUILD_DIR/ESPFlyController.xcarchive/Products/Applications/ESPFlyController.app" Payload/
          /usr/bin/zip -qry ESPFlyController.ipa Payload

    artifacts:
      - ESPFlyController.ipa

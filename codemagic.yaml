workflows:
  ios-build:
    name: ESPFlyController iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: 26.2
      ios_signing:
        distribution_type: development
        bundle_identifier: com.miochili.ESPFlyController

    scripts:
      - name: Install dependencies
        script: |
          set -e
          xcodebuild -version

      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          xcode-project use-profiles

      - name: Archive app
        script: |
          set -e
          xcodebuild archive \
            -project ESPFlyController.xcodeproj \
            -scheme ESPFlyController \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ESPFlyController.xcarchive"

      - name: Export IPA
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ESPFlyController.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/export"

    artifacts:
      - export/*.ipa

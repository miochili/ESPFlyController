name: ESPFlyController
options:
  bundleIdPrefix: com.espfly
  deploymentTarget:
    iOS: 15.0
settings:
  base:
    SWIFT_VERSION: 5.0
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
targets:
  ESPFlyController:
    type: application
    platform: iOS
    sources:
      - path: .
        includes:
          - "*.swift"
        excludes:
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espfly.controller
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Info.plist
        ENABLE_BITCODE: NO
